services:
  postgres:
    image: postgres:16
    container_name: queuectl-postgres
    environment:
      POSTGRES_DB: queuectl
      POSTGRES_USER: queuectl
      POSTGRES_PASSWORD: queuectl
    ports:
      - "${QUEUECTL_PG_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U queuectl -d queuectl"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
